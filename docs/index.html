<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0F1A" />
    <meta name="robots" content="noindex" />
    <title>Email confirmed — PocketNet</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f1a;
        --panel: #121828;
        --border: #1f2840;
        --text: #e7ecf7;
        --muted: #93a0bd;
        --accent: #7c9bff;
        --good: #58e1a0;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: radial-gradient(1200px 800px at 50% -10%, #1a2240 0%, var(--bg) 60%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      main {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 480px;
        background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)) , var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px 28px;
        text-align: center;
        box-shadow: 0 30px 60px rgba(0,0,0,0.45);
      }
      .check {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background: rgba(88, 225, 160, 0.12);
        border: 1px solid rgba(88, 225, 160, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .check svg { width: 36px; height: 36px; }
      h1 {
        margin: 8px 0 6px;
        font-size: 26px;
        letter-spacing: -0.01em;
      }
      p { margin: 0; color: var(--muted); line-height: 1.55; font-size: 15px; }
      .brand {
        margin-bottom: 22px;
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 600;
      }
      .actions {
        margin-top: 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 46px;
        padding: 0 18px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        border: 1px solid transparent;
        transition: transform 80ms ease, background 120ms ease;
      }
      .btn:active { transform: translateY(1px); }
      .btn-primary {
        background: var(--accent);
        color: #0b0f1a;
      }
      .btn-secondary {
        background: transparent;
        color: var(--text);
        border-color: var(--border);
      }
      .footer {
        margin-top: 22px;
        font-size: 12px;
        color: var(--muted);
      }
      .footer a { color: var(--accent); text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-live="polite">
        <div class="brand">PocketNet</div>
        <div class="check" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="#58e1a0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5" />
          </svg>
        </div>
        <h1>Email confirmed</h1>
        <p>Your PocketNet account is verified. You can close this tab and sign in from the app.</p>
        <div class="actions">
          <a class="btn btn-primary" id="openApp" href="pocketnet://confirmed">Open PocketNet</a>
          <a class="btn btn-secondary" href="https://github.com/DosukaSOL/PocketNet/releases">Download the APK</a>
        </div>
        <p class="footer">
          PocketNet is a handheld-native social app.
          <br />
          <a href="https://github.com/DosukaSOL/PocketNet">github.com/DosukaSOL/PocketNet</a>
        </p>
      </section>
    </main>
    <script>
      // If Supabase appended a token in the URL hash (PKCE flow), bounce into the app
      // with the same fragment so the app's deep-link handler can finalize the session.
      (function () {
        try {
          var hash = window.location.hash || "";
          var search = window.location.search || "";
          if (hash || search) {
            var openApp = document.getElementById("openApp");
            if (openApp) {
              openApp.href = "pocketnet://confirmed" + search + hash;
            }
          }
        } catch (_) {}
      })();
    </script>
  </body>
</html>
