name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub Release tag, for example v0.1.0-beta.1
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    name: EAS APK build and GitHub Release upload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_POCKETNET_SITE_URL: ${{ vars.EXPO_PUBLIC_POCKETNET_SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate required secrets
        run: |
          test -n "$EXPO_TOKEN"
          test -n "$EXPO_PUBLIC_SUPABASE_URL"
          test -n "$EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY"

      - name: QA
        run: npm run qa

      - name: Install EAS CLI
        run: npm install --global eas-cli

      - name: Build APK with EAS
        run: eas build --platform android --profile production --non-interactive --wait --json > eas-build.json

      - name: Download APK
        run: |
          node -e "const fs=require('fs');const build=JSON.parse(fs.readFileSync('eas-build.json','utf8'));const item=Array.isArray(build)?build[0]:build;const url=item?.artifacts?.buildUrl;if(!url){throw new Error('EAS build did not return an APK URL')}fs.writeFileSync('apk-url.txt', url)"
          curl --fail --location "$(cat apk-url.txt)" --output PocketNet.apk
          shasum -a 256 PocketNet.apk > PocketNet.apk.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" PocketNet.apk PocketNet.apk.sha256 \
            --title "PocketNet $RELEASE_TAG" \
            --notes "PocketNet Android APK build. Verify the SHA-256 checksum before installing."
