name: PocketNet QA

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  qa:
    name: Typecheck, lint, test, secret scan
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_POCKETNET_SITE_URL: ${{ vars.EXPO_PUBLIC_POCKETNET_SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --runInBand

      - name: Secret scan
        run: npm run check:secrets
